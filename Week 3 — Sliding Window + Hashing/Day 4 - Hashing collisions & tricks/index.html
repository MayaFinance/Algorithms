<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 4: Hashing Architecture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body{font-family:'Inter',-apple-system,sans-serif;background:#f8fafc;color:#1e293b;}
        .task-checkbox{appearance:none;background:#fff;width:1.4em;height:1.4em;border:2px solid #cbd5e1;border-radius:.25em;display:grid;place-content:center;cursor:pointer;transition:all .2s;}
        .task-checkbox::before{content:"";width:.75em;height:.75em;transform:scale(0);transition:120ms transform ease-in-out;box-shadow:inset 1em 1em white;clip-path:polygon(14% 44%,0 65%,50% 100%,100% 16%,80% 0%,43% 62%);}
        .task-checkbox:checked{background:#ec4899;border-color:#ec4899;}
        .task-checkbox:checked::before{transform:scale(1);}
        .task-row.done .task-text{color:#94a3b8;text-decoration:line-through;}
    </style>
</head>
<body class="min-h-screen pb-16">
<header class="bg-white border-b border-slate-200 sticky top-0 z-20 shadow-sm">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
        <div>
            <div class="text-xs font-bold text-slate-400 uppercase tracking-widest">Week 3 · Day 4</div>
            <h1 class="text-2xl font-extrabold text-slate-800">Hashing Architecture</h1>
        </div>
        <div class="bg-pink-50 px-4 py-2 rounded-xl border border-pink-100">
            <div class="text-lg font-bold text-pink-700">Safe Hashes</div>
            <div class="text-xs font-bold text-pink-600 uppercase">⚡ Collisions & Structs</div>
        </div>
    </div>
</header>
<main class="max-w-6xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
    <aside class="lg:col-span-4 space-y-5 lg:sticky lg:top-24">
        <section class="bg-pink-600 text-white p-5 rounded-2xl shadow-lg">
            <h2 class="text-lg font-bold mb-3">🎯 Hashing Primitives</h2>
            <div class="bg-pink-800 p-3 rounded-xl font-mono text-xs text-pink-100 space-y-1">
                <div>// Custom pair Hash</div>
                <div>hash&lt;T1&gt;{}(p.f) ^ (hash&lt;T2&gt;{}(p.s) &lt;&lt; 1)</div>
                <div class="pt-2">// Negative Buckets</div>
                <div>id = (num >= 0) ? num / w : (num + 1) / w - 1;</div>
            </div>
        </section>
        <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
            <h3 class="font-bold text-slate-800 mb-3">Progress</h3>
            <div class="relative w-48 h-48 mx-auto">
                <canvas id="donut"></canvas>
                <div class="absolute inset-0 flex items-center justify-center flex-col"><span class="text-2xl font-black text-slate-800" id="pct">0%</span><span class="text-xs text-slate-500 font-bold">DONE</span></div>
            </div>
            <div class="mt-3 flex justify-between text-sm"><span class="font-bold text-slate-600" id="hDone">0h</span><span class="text-slate-400">/ 14h</span></div>
            <div class="w-full bg-slate-100 rounded-full h-2 mt-2 overflow-hidden"><div class="bg-pink-500 h-2 rounded-full transition-all" style="width:0" id="pBar"></div></div>
        </section>
    </aside>
    <div class="lg:col-span-8 space-y-5" id="task-list"></div>
</main>
<script>
const TOTAL=14; let done=new Set(), hrs=0; let chart;
const blocks=[
    {title:'📚 Block 1 — Theory',time:'2h',color:'pink',tasks:[
        {id:'t1',h:1,text:'Visualize vector<list<Node>> for separate chaining.'},
        {id:'t2',h:1,text:'Type out custom tuple hasher syntax.'},
    ]},
    {title:'🟢 Block 2 — Basics (P1, P5, P6)',time:'4h',color:'emerald',tasks:[
        {id:'p1',h:1,text:'P1: Design HashMap',hint:'Use prime modulo bucket sizing.'},
        {id:'p5',h:2,text:'P5: Contains Duplicate III',hint:'Map elements into ranges of size t+1 to bypass limits.'},
        {id:'p6',h:1,text:'P6: Brick Wall',hint:'Map occurrences of specific running sums (edges)'},
    ]},
    {title:'🟡 Block 3 — Precision (P7, P8)',time:'3h',color:'orange',tasks:[
        {id:'p7',h:1.5,text:'P7: Fractional Recurring Decimal',hint:'Map tracking remainder value and its mapped string index.'},
        {id:'p8',h:1.5,text:'P8: Max Points on Line',hint:'Use GCD to reduce slopes cleanly. pair<dx,dy>.'},
    ]},
    {title:'🔴 Block 4 — Advanced Hash (P3, P4, P9)',time:'4h',color:'rose',tasks:[
        {id:'p3',h:1,text:'P3: Repeated DNA Seq',hint:'Try bitwise rep: A=00,C=01,G=10,T=11.'},
        {id:'p4',h:2,text:'P4: Longest Dup Substr',hint:'Rabin-Karp + Binary Search lengths.'},
        {id:'p9',h:1,text:'P9: Boomerangs',hint:'Double loop, count[distance].'},
    ]},
    {title:'✅ Block 5 — Consolidation',time:'1h',color:'sky',tasks:[
        {id:'t3',h:1,text:'Audit code memory on P1, P8.'},
    ]},
];
function toggle(id){document.getElementById(id).classList.toggle('hidden');}
function tick(id,h){
    const row=document.getElementById('t-'+id);
    if(done.has(id)){done.delete(id);hrs-=h;row.classList.remove('done');}
    else{done.add(id);hrs+=h;row.classList.add('done');}
    const p=Math.min(Math.round(hrs/TOTAL*100),100);
    document.getElementById('pct').textContent=p+'%';
    document.getElementById('hDone').textContent=hrs.toFixed(1)+'h';
    document.getElementById('pBar').style.width=p+'%';
    if(chart){chart.data.datasets[0].data=[hrs,TOTAL-hrs];chart.update();}
}
function buildUI(){
    const colorMap={pink:'#ec4899',emerald:'#10b981',orange:'#f97316',rose:'#f43f5e',sky:'#0ea5e9'};
    const container=document.getElementById('task-list');
    container.innerHTML=blocks.map(b=>`
        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="px-5 py-4 border-b border-slate-100 flex justify-between items-center">
                <h2 class="text-lg font-bold text-slate-800">${b.title}</h2>
                <span class="text-xs font-bold px-3 py-1 rounded-full" style="background:${colorMap[b.color]}20;color:${colorMap[b.color]}">⏱ ${b.time}</span>
            </div>
            <div class="p-5 space-y-3">
                ${b.tasks.map(t=>`
                    <div class="task-row p-3 hover:bg-slate-50 rounded-xl" id="t-${t.id}">
                        <label class="flex items-start gap-3 cursor-pointer">
                            <input type="checkbox" class="task-checkbox mt-0.5" onchange="tick('${t.id}',${t.h})">
                            <span class="task-text font-semibold text-slate-800">${t.text}</span>
                        </label>
                        ${t.hint?`<div class="ml-8 mt-1"><button onclick="toggle('h-${t.id}')" class="text-xs font-bold px-2 py-1 rounded uppercase" style="background:${colorMap[b.color]}20;color:${colorMap[b.color]}">Hint</button><div id="h-${t.id}" class="hidden mt-2 text-xs bg-slate-800 px-3 py-2 rounded-xl" style="color:${colorMap[b.color]}">${t.hint}</div></div>`:''}
                    </div>`).join('')}
            </div>
        </section>`).join('');
}
document.addEventListener('DOMContentLoaded',()=>{
    buildUI();
    chart=new Chart(document.getElementById('donut').getContext('2d'),{
        type:'doughnut',data:{datasets:[{data:[0,TOTAL],backgroundColor:['#ec4899','#f1f5f9'],borderWidth:0}]},
        options:{responsive:true,maintainAspectRatio:false,cutout:'80%',plugins:{legend:{display:false}}}
    });
});
</script>
</body>
</html>
